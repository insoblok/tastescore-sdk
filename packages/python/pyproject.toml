[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tastescore-sdk"
version = "0.1.0"
description = "Official Python SDK for the TasteScore V2 crypto wallet reputation API"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [
    { name = "InSoBlok", email = "dev@insoblokai.io" },
]
keywords = ["tastescore", "crypto", "wallet", "reputation", "scoring", "web3", "defi", "trust", "insoblokai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "requests>=2.28.0",
]

[project.optional-dependencies]
async = ["aiohttp>=3.9.0"]
websocket = ["websockets>=12.0"]
all = ["aiohttp>=3.9.0", "websockets>=12.0"]

[project.urls]
Homepage = "https://insoblokai.io"
Documentation = "https://portal.insoblokai.io/api"
Repository = "https://github.com/insoblok/tastescore-sdk"
"Bug Tracker" = "https://github.com/insoblok/tastescore-sdk/issues"

[tool.setuptools.packages.find]
where = ["src"]
